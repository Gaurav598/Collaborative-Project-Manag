<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>CollabPM — Collaborative Project Management</title>
    <meta name="title" content="CollabPM — Collaborative Project Management" />
    <meta
      name="description"
      content="CollabPM is an open-source project management platform. Manage workspaces, projects, tasks, and team members with analytics and calendar views."
    />
    <meta name="keywords" content="project management, task management, team collaboration, kanban, workspace" />
    <meta name="author" content="CollabPM" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CollabPM — Collaborative Project Management" />
    <meta
      property="og:description"
      content="Open-source project management platform with workspaces, projects, tasks, analytics, and team collaboration."
    />
    <meta property="og:image" content="/favicon.ico" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="CollabPM — Collaborative Project Management" />
    <meta
      property="twitter:description"
      content="Open-source project management platform with workspaces, projects, tasks, analytics, and team collaboration."
    />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#3b82f6" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
